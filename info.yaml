yaml_version: 6

project:
  title: "Rule 30 Cellular Automaton VGA Display"
  author: "NAVEEN KUMAAR S"
  description: "Hardware implementation of Wolfram Rule 30 cellular automaton rendered on a VGA monitor."

  language: "Verilog"
  clock_hz: 25000000
  tiles: "1x1"

  top_module: "tt_um_rule30_vga"

  source_files:
    - project.v
    - hvsync_generator.v

  pinout:
    ui[0]: "Palette bit 0"
    ui[1]: "Palette bit 1"
    ui[2]: "unused"
    ui[3]: "unused"
    ui[4]: "unused"
    ui[5]: "unused"
    ui[6]: "unused"
    ui[7]: "unused"

    uo[0]: "VGA Red MSB"
    uo[1]: "VGA Green MSB"
    uo[2]: "VGA Blue MSB"
    uo[3]: "VGA Vsync"
    uo[4]: "VGA Red LSB"
    uo[5]: "VGA Green LSB"
    uo[6]: "VGA Blue LSB"
    uo[7]: "VGA Hsync"

    uio[0]: "unused"
    uio[1]: "unused"
    uio[2]: "unused"
    uio[3]: "unused"
    uio[4]: "unused"
    uio[5]: "unused"
    uio[6]: "unused"
    uio[7]: "unused"

  tags:
    - vga
    - cellular-automaton
