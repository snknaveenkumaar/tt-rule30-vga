title: "Rule 30 Cellular Automaton VGA Display"
author: "NAVEEN KUMAAR S"
description: "Implements Wolfram Rule 30 cellular automaton on a 320-cell grid and displays the chaotic evolution on a VGA monitor."

how_it_works: |
  A 320-bit register stores the current generation of the cellular automaton.
  Each new generation is computed using Wolfram Rule-30:
  new_cell = left XOR (center OR right).

  Every VGA row represents the next generation of the automaton.
  Each cell maps to two horizontal pixels (320 × 2 = 640 pixels).
  The initial state is a single seed cell at the center.

how_to_test: |
  Connect a VGA monitor to the Tiny VGA PMOD pins.

  Provide a 25 MHz clock and release reset.
  A triangular chaotic pattern should appear from the top center of the screen.

  Change ui_in[1:0] to switch colour palettes.

language: "Verilog"
clock_hz: 25000000
tiles: "1x1"

top_module: "tt_um_rule30_vga"

source_files:
  - project.v
  - hvsync_generator.v

pinout:
  ui[0]: "Palette select bit 0"
  ui[1]: "Palette select bit 1"
  ui[2]: "unused"
  ui[3]: "unused"
  ui[4]: "unused"
  ui[5]: "unused"
  ui[6]: "unused"
  ui[7]: "unused"

  uo[0]: "R1 VGA"
  uo[1]: "G1 VGA"
  uo[2]: "B1 VGA"
  uo[3]: "VSYNC"
  uo[4]: "R0 VGA"
  uo[5]: "G0 VGA"
  uo[6]: "B0 VGA"
  uo[7]: "HSYNC"

  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

