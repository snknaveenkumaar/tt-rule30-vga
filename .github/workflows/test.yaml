name: test
on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install iverilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          make
          # Fail if any <failure> or <error> tags appear in results
          ! grep -E '<(failure|error)' results.xml

      - name: Upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*

      - name: Test summary
        if: success() || failure()
        uses: test-summary/action@v2.3
        with:
          paths: test/results.xml
          # NOTE: 'type' is NOT a valid input for v2.3 — valid inputs are
          # only 'paths', 'output', and 'show'. The action auto-detects JUnit.
